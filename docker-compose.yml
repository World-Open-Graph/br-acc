# BRACC Docker Compose - Local Development
# Usage:
#   cp .env.example .env && edit NEO4J_PASSWORD
#   docker compose up -d
#   docker compose exec api python -m bracc.seed  # load sample data (optional)

services:
  neo4j:
    image: neo4j:5-community
    container_name: bracc-neo4j
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
      NEO4J_dbms_memory_transaction_total_max: 512m
    volumes:
      - neo4j-data:/data
      - ./infra/neo4j/import:/var/lib/neo4j/import
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: ./api
    container_name: bracc-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-dev}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      INVITE_CODE: ${INVITE_CODE:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PRODUCT_TIER: ${PRODUCT_TIER:-community}
      PATTERNS_ENABLED: ${PATTERNS_ENABLED:-false}
      PUBLIC_MODE: ${PUBLIC_MODE:-false}
      PUBLIC_ALLOW_PERSON: ${PUBLIC_ALLOW_PERSON:-false}
      PUBLIC_ALLOW_ENTITY_LOOKUP: ${PUBLIC_ALLOW_ENTITY_LOOKUP:-false}
      PUBLIC_ALLOW_INVESTIGATIONS: ${PUBLIC_ALLOW_INVESTIGATIONS:-false}
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: bracc-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_PUBLIC_MODE: ${VITE_PUBLIC_MODE:-false}
      VITE_PATTERNS_ENABLED: ${VITE_PATTERNS_ENABLED:-false}
    depends_on:
      - api

volumes:
  neo4j-data:
